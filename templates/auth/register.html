{% load static %}
<!doctype html>
<html lang="km-en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – TaskFlow PM</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="auth-wrapper">
      <div class="auth-card" style="max-width: 460px">
        <div class="auth-logo">
          <div
            class="logo-icon"
            style="
              width: 52px;
              height: 52px;
              border-radius: 14px;
              margin: 0 auto 12px;
              background: linear-gradient(135deg, #4f6ef7, #7c3aed);
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 26px;
              font-weight: 800;
              color: white;
            "
          >
            T
          </div>

          <h1>Create Account</h1>
          <p>Join TaskFlow / ចូលរួម TaskFlow</p>
        </div>

        {% for message in messages %}
          <div class="alert alert-error">{{ message }}</div>
        {% endfor %}

        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Full Name / ឈ្មោះពេញ</label>
              <input
                type="text"
                name="full_name"
                class="form-control"
                placeholder="Dara Chan"
              />
            </div>

            <div class="form-group">
              <label class="form-label">Username / ឈ្មោះអ្នកប្រើ</label>
              <input
                type="text"
                name="username"
                class="form-control"
                placeholder="darachan"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="dara@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Password / លេខសម្ងាត់</label>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Min 8 characters"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Avatar / រូបភាព</label>

            <div style="display: flex; align-items: center; gap: 14px;">
              <div
                style="
                  width: 70px;
                  height: 70px;
                  border-radius: 50%;
                  overflow: hidden;
                  background: linear-gradient(135deg, #4f6ef7, #7c3aed);
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  color: white;
                  font-size: 28px;
                  font-weight: 800;
                  flex-shrink: 0;
                "
              >
                <img
                  id="avatarPreview"
                  src=""
                  alt=""
                  style="display:none;width:100%;height:100%;object-fit:cover;"
                />
                <i id="avatarIcon" class="fa-solid fa-user"></i>
              </div>

              <input
                type="file"
                name="avatar"
                id="avatarInput"
                class="form-control"
                accept="image/*"
              />
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100"
            style="justify-content: center; padding: 11px; margin-top: 4px"
          >
            <i class="fa-solid fa-user-plus"></i>
            Register / ចុះឈ្មោះ
          </button>
        </form>

        <div class="auth-divider">— already have an account? —</div>

        <a
          href="{% url 'login' %}"
          class="btn btn-secondary w-100"
          style="justify-content: center; padding: 11px"
        >
          <i class="fa-solid fa-right-to-bracket"></i>
          Login / ចូល
        </a>
      </div>
    </div>

    <script>
      const avatarInput = document.getElementById("avatarInput");
      const avatarPreview = document.getElementById("avatarPreview");
      const avatarIcon = document.getElementById("avatarIcon");

      avatarInput.addEventListener("change", function () {
        const file = this.files[0];

        if (file) {
          avatarPreview.src = URL.createObjectURL(file);
          avatarPreview.style.display = "block";
          avatarIcon.style.display = "none";
        }
      });
    </script>
  </body>
</html>
