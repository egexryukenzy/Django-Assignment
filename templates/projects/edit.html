{% extends 'base.html' %}
{% block title %}Edit {{ project.name }}{% endblock %}
{% block page_title %}Edit Project / កែប្រែគម្រោង{% endblock %}
{% block content %}
<div style="max-width:600px;margin:0 auto">
  <div class="card">
    <div class="card-header"><div class="fw-700">Edit: {{ project.name }}</div></div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Project Name</label>
          <input type="text" name="name" class="form-control" value="{{ project.name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ project.description }}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select name="status" class="form-control">
            <option value="active" {% if project.status == 'active' %}selected{% endif %}>Active</option>
            <option value="archived" {% if project.status == 'archived' %}selected{% endif %}>Archived</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <a href="{% url 'project_detail' project.id %}" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
